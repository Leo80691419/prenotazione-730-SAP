<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prenotazioni Evento</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 1rem; }
  .container { max-width: 680px; margin: 0 auto; padding: 1.5rem 0; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 0.25rem; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .tab-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .tab-btn { padding: 8px 20px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #666; font-size: 14px; cursor: pointer; }
  .tab-btn.active { background: #e6f1fb; color: #0c447c; border-color: #85b7eb; font-weight: 500; }
  .day-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .day-btn { padding: 6px 14px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #666; font-size: 13px; cursor: pointer; }
  .day-btn.active { background: #e6f1fb; color: #0c447c; border-color: #85b7eb; font-weight: 500; }
  .sede-info { font-size: 13px; color: #666; margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
  .sede-badge { font-size: 11px; padding: 2px 10px; border-radius: 99px; background: #eeedfe; color: #3c3489; }
  .slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-bottom: 1.5rem; }
  .slot { border: 1px solid #ddd; border-radius: 8px; padding: 10px; cursor: pointer; background: #fff; transition: border-color 0.1s; }
  .slot:hover:not(.booked) { border-color: #378add; }
  .slot.selected { border: 2px solid #378add; background: #e6f1fb; }
  .slot.booked { cursor: default; background: #f5f5f3; }
  .slot-time { font-size: 13px; font-weight: 500; }
  .slot-badge { display: inline-block; margin-top: 5px; font-size: 11px; padding: 2px 8px; border-radius: 99px; }
  .badge-free { background: #e1f5ee; color: #085041; }
  .badge-booked { background: #d3d1c7; color: #444441; }
  .slot-who { font-size: 11px; color: #888; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .form-card { border: 1px solid #e0e0e0; border-radius: 12px; padding: 1.25rem; background: #fff; margin-bottom: 1rem; }
  .form-card h2 { font-size: 15px; font-weight: 500; margin-bottom: .5rem; }
  .form-card p.sub { font-size: 13px; color: #666; margin-bottom: 1rem; }
  label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
  input[type=text], input[type=password], select {
    width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; background: #fff; color: #1a1a1a; margin-bottom: 1rem;
    -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus { outline: none; border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
  .btn-row { display: flex; gap: 8px; }
  button { padding: 9px 18px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; font-size: 14px; cursor: pointer; }
  button:hover { background: #f5f5f3; }
  button:disabled { opacity: 0.5; cursor: default; }
  button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  button.primary:hover:not(:disabled) { background: #333; }
  .confirm-box { border-radius: 8px; padding: 12px 16px; background: #e1f5ee; color: #085041; font-size: 14px; margin-top: 1rem; }
  .err-box { border-radius: 8px; padding: 12px 16px; background: #fcebeb; color: #791f1f; font-size: 14px; margin-top: 1rem; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: #f5f5f3; border-radius: 8px; padding: 1rem; }
  .stat-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  .admin-table th { text-align: left; padding: 8px 12px; font-size: 12px; font-weight: 500; color: #666; border-bottom: 1px solid #e0e0e0; }
  .admin-table td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; word-break: break-word; }
  .admin-table tr:last-child td { border-bottom: none; }
  .del-btn { background: none; border: none; cursor: pointer; color: #a32d2d; font-size: 12px; padding: 3px 8px; border-radius: 4px; }
  .del-btn:hover { background: #fcebeb; }
  .empty-msg { font-size: 14px; color: #888; padding: 2rem; text-align: center; }
  .loading { font-size: 14px; color: #888; padding: 2rem; text-align: center; }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .table-wrap { border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; background: #fff; overflow-x: auto; }
</style>
</head>
<body>
<div class="container">
  <h1>Prenotazioni Evento</h1>
  <p class="subtitle">Seleziona una data e scegli la tua fascia oraria</p>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('public')">Prenota</button>
    <button class="tab-btn" onclick="showTab('admin')">Area admin</button>
  </div>

  <!-- VISTA PUBBLICA -->
  <div id="tab-public">
    <div class="day-tabs" id="dayTabs"></div>
    <div class="sede-info" id="sedeInfo"></div>
    <div id="loadingSlots" class="loading">Caricamento fasce orarie...</div>
    <div class="slot-grid" id="slotGrid" style="display:none;"></div>
    <div class="form-card" id="bookingForm" style="display:none;">
      <h2>Conferma prenotazione</h2>
      <p class="sub" id="selectedSlotLabel"></p>
      <label>Nome e cognome</label>
      <input type="text" id="nameInput" placeholder="Es. Mario Rossi" />
      <div class="btn-row">
        <button class="primary" onclick="confirmBooking()" id="confirmBtn">Conferma</button>
        <button onclick="cancelSelection()">Annulla</button>
      </div>
      <div id="msgBox" style="display:none;"></div>
    </div>
  </div>

  <!-- VISTA ADMIN -->
  <div id="tab-admin" style="display:none;">
    <div id="adminAuth">
      <div class="form-card" style="max-width:320px;">
        <h2>Accesso admin</h2><br/>
        <label>Password</label>
        <input type="password" id="pwdInput" placeholder="Password..." onkeydown="if(event.key==='Enter')checkPwd()" />
        <button class="primary" onclick="checkPwd()" style="width:100%;">Accedi</button>
        <div id="pwdErr" style="display:none;" class="err-box"></div>
      </div>
    </div>
    <div id="adminPanel" style="display:none;">
      <div class="stat-grid" id="statGrid"></div>
      <div class="toolbar">
        <select id="filterDay" onchange="renderAdmin()"></select>
        <button onclick="reloadAdmin()">&#8635; Aggiorna</button>
        <button onclick="exportCSV()" style="margin-left:auto;">Esporta CSV</button>
        <button onclick="adminLogout()">Esci</button>
      </div>
      <div class="table-wrap">
        <table class="admin-table">
          <thead><tr>
            <th style="width:28%">Fascia oraria</th>
            <th style="width:20%">Data</th>
            <th style="width:18%">Sede</th>
            <th style="width:24%">Nome</th>
            <th style="width:10%"></th>
          </tr></thead>
          <tbody id="adminList"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIGURAZIONE ──────────────────────────────────────────────
const GH_USER  = "Leo80691419";
const GH_REPO  = "prenotazione-730-SAP";
const GH_FILE  = "prenotazioni.json";
const GH_TOKEN = "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"; // sostituisci con il tuo token ghp_...
const ADMIN_PWD = "admin2025";
// ────────────────────────────────────────────────────────────────

const API_BASE = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;

const days = [
  { id: "18mag", label: "18 maggio", sede: "Vicenza" },
  { id: "19mag", label: "19 maggio", sede: "Vicenza" },
  { id: "20mag", label: "20 maggio", sede: "Bassano" },
  { id: "21mag", label: "21 maggio", sede: "Schio" }
];

function generateSlots() {
  const s = [];
  for (let h = 9; h < 13; h++) {
    for (let m = 0; m < 60; m += 15) {
      const hh = String(h).padStart(2,'0'), mm = String(m).padStart(2,'0');
      let eh = h, em = m + 15;
      if (em === 60) { em = 0; eh++; }
      s.push(hh+":"+mm+"–"+String(eh).padStart(2,'0')+":"+String(em).padStart(2,'0'));
    }
  }
  return s;
}
const allSlots = generateSlots();

let bookings = {};
let fileSha = null;
let selectedDay = days[0].id;
let selectedSlot = null;

// ── GITHUB API ──────────────────────────────────────────────────
async function ghGet() {
  const res = await fetch(API_BASE, {
    headers: { Authorization: "token " + GH_TOKEN, Accept: "application/vnd.github.v3+json" }
  });
  if (res.status === 404) { fileSha = null; return {}; }
  if (!res.ok) throw new Error("Errore lettura GitHub: " + res.status);
  const data = await res.json();
  fileSha = data.sha;
  return JSON.parse(atob(data.content.replace(/\n/g,"")));
}

async function ghSet(content) {
  const body = {
    message: "Aggiorna prenotazioni",
    content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
    ...(fileSha ? { sha: fileSha } : {})
  };
  const res = await fetch(API_BASE, {
    method: "PUT",
    headers: {
      Authorization: "token " + GH_TOKEN,
      Accept: "application/vnd.github.v3+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || "Errore scrittura GitHub");
  }
  const data = await res.json();
  fileSha = data.content.sha;
}

async function loadBookings() {
  bookings = await ghGet();
}

function getBooking(dayId, slot) {
  return bookings[dayId] && bookings[dayId][slot] ? bookings[dayId][slot] : null;
}

async function setBooking(dayId, slot, name) {
  // rileggi prima di scrivere per evitare conflitti
  bookings = await ghGet();
  if (getBooking(dayId, slot)) return false;
  if (!bookings[dayId]) bookings[dayId] = {};
  bookings[dayId][slot] = name;
  await ghSet(bookings);
  return true;
}

async function removeBooking(dayId, slot) {
  bookings = await ghGet();
  if (bookings[dayId]) { delete bookings[dayId][slot]; }
  await ghSet(bookings);
}

// ── RENDER ──────────────────────────────────────────────────────
function renderDayTabs() {
  document.getElementById('dayTabs').innerHTML = days.map(d =>
    `<button class="day-btn${d.id===selectedDay?' active':''}" onclick="selectDay('${d.id}')">${d.label}</button>`
  ).join('');
}

function renderSedeInfo() {
  const d = days.find(x => x.id === selectedDay);
  document.getElementById('sedeInfo').innerHTML = `<span>Sede</span><span class="sede-badge">${d.sede}</span>`;
}

function renderSlots() {
  document.getElementById('loadingSlots').style.display = 'none';
  const grid = document.getElementById('slotGrid');
  grid.style.display = 'grid';
  grid.innerHTML = allSlots.map(slot => {
    const booked = getBooking(selectedDay, slot);
    const sel = selectedSlot === slot;
    if (booked) {
      return `<div class="slot booked">
        <div class="slot-time">${slot.replace('–',' – ')}</div>
        <span class="slot-badge badge-booked">Prenotato</span>
        <div class="slot-who">${booked}</div>
      </div>`;
    }
    return `<div class="slot${sel?' selected':''}" onclick="selectSlot('${slot}')">
      <div class="slot-time">${slot.replace('–',' – ')}</div>
      <span class="slot-badge badge-free">Disponibile</span>
    </div>`;
  }).join('');
}

async function selectDay(id) {
  selectedDay = id;
  selectedSlot = null;
  document.getElementById('bookingForm').style.display = 'none';
  document.getElementById('slotGrid').style.display = 'none';
  document.getElementById('loadingSlots').style.display = 'block';
  renderDayTabs();
  renderSedeInfo();
  await loadBookings();
  renderSlots();
}

function selectSlot(slot) {
  if (getBooking(selectedDay, slot)) return;
  selectedSlot = slot;
  const d = days.find(x => x.id === selectedDay);
  document.getElementById('selectedSlotLabel').textContent =
    d.label + ' · ' + d.sede + ' · ' + slot.replace('–',' – ');
  document.getElementById('bookingForm').style.display = 'block';
  document.getElementById('msgBox').style.display = 'none';
  document.getElementById('nameInput').value = '';
  renderSlots();
  document.getElementById('bookingForm').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function cancelSelection() {
  selectedSlot = null;
  document.getElementById('bookingForm').style.display = 'none';
  renderSlots();
}

async function confirmBooking() {
  const name = document.getElementById('nameInput').value.trim();
  const msgBox = document.getElementById('msgBox');
  const btn = document.getElementById('confirmBtn');
  if (!name) {
    msgBox.className = 'err-box'; msgBox.textContent = 'Inserisci il tuo nome e cognome.';
    msgBox.style.display = 'block'; return;
  }
  btn.disabled = true; btn.textContent = 'Salvataggio...';
  try {
    const slotToBook = selectedSlot;
    const ok = await setBooking(selectedDay, slotToBook, name);
    if (ok) {
      const d = days.find(x => x.id === selectedDay);
      msgBox.className = 'confirm-box';
      msgBox.textContent = 'Prenotazione confermata! ' + name + ' · ' + d.label + ' · ' + d.sede + ' · ' + slotToBook.replace('–',' – ');
      msgBox.style.display = 'block';
      selectedSlot = null;
      renderSlots();
      setTimeout(() => {
        document.getElementById('bookingForm').style.display = 'none';
        msgBox.style.display = 'none';
      }, 4000);
    } else {
      msgBox.className = 'err-box';
      msgBox.textContent = 'Spiacente, questa fascia è appena stata prenotata. Scegline un\'altra.';
      msgBox.style.display = 'block';
      selectedSlot = null;
      renderSlots();
    }
  } catch(e) {
    msgBox.className = 'err-box';
    msgBox.textContent = 'Errore di rete. Riprova tra qualche secondo.';
    msgBox.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Conferma';
}

// ── TAB ─────────────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('tab-public').style.display = tab === 'public' ? 'block' : 'none';
  document.getElementById('tab-admin').style.display  = tab === 'admin'  ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', (i===0&&tab==='public')||(i===1&&tab==='admin')));
}

// ── ADMIN ────────────────────────────────────────────────────────
function checkPwd() {
  if (document.getElementById('pwdInput').value === ADMIN_PWD) {
    document.getElementById('adminAuth').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    populateFilter();
    reloadAdmin();
  } else {
    const e = document.getElementById('pwdErr');
    e.textContent = 'Password errata.'; e.style.display = 'block';
  }
}

function adminLogout() {
  document.getElementById('adminAuth').style.display = 'block';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('pwdInput').value = '';
  document.getElementById('pwdErr').style.display = 'none';
}

function populateFilter() {
  document.getElementById('filterDay').innerHTML =
    '<option value="all">Tutte le date</option>' +
    days.map(d => `<option value="${d.id}">${d.label} – ${d.sede}</option>`).join('');
}

async function reloadAdmin() {
  await loadBookings();
  renderAdmin();
  renderStats();
}

function getAllFlat() {
  const rows = [];
  for (const d of days)
    for (const slot of allSlots) {
      const name = getBooking(d.id, slot);
      if (name) rows.push({ dayId: d.id, label: d.label, sede: d.sede, slot, name });
    }
  return rows;
}

function renderAdmin() {
  const filter = document.getElementById('filterDay').value;
  const rows = getAllFlat().filter(r => filter === 'all' || r.dayId === filter);
  const tbody = document.getElementById('adminList');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">Nessuna prenotazione trovata.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r =>
    `<tr>
      <td>${r.slot.replace('–',' – ')}</td>
      <td>${r.label}</td>
      <td>${r.sede}</td>
      <td style="font-weight:500;">${r.name}</td>
      <td><button class="del-btn" onclick="adminDelete('${r.dayId}','${r.slot}')">Elimina</button></td>
    </tr>`
  ).join('');
}

function renderStats() {
  const all = getAllFlat();
  const tot = days.length * allSlots.length;
  let html = `<div class="stat-card"><div class="stat-label">Totale prenotazioni</div><div class="stat-val">${all.length} / ${tot}</div></div>`;
  for (const d of days) {
    const c = all.filter(r => r.dayId === d.id).length;
    html += `<div class="stat-card"><div class="stat-label">${d.label} – ${d.sede}</div><div class="stat-val">${c} / ${allSlots.length}</div></div>`;
  }
  document.getElementById('statGrid').innerHTML = html;
}

async function adminDelete(dayId, slot) {
  await removeBooking(dayId, slot);
  renderAdmin(); renderStats(); renderSlots();
}

function exportCSV() {
  const rows = getAllFlat();
  if (!rows.length) { alert('Nessuna prenotazione da esportare.'); return; }
  const lines = ['Data,Sede,Fascia oraria,Nome'];
  for (const r of rows)
    lines.push(`"${r.label}","${r.sede}","${r.slot.replace('–',' – ')}","${r.name}"`);
  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'prenotazioni_evento.csv';
  a.click();
}

// ── INIT ─────────────────────────────────────────────────────────
(async () => {
  renderDayTabs();
  renderSedeInfo();
  await loadBookings();
  renderSlots();
})();
</script>
</body>
</html>
